<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<title>VV GameZone</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pk:#ff6eb4;--pu:#a855f7;--cy:#22d3ee;--ye:#fbbf24;--gn:#34d399;--rd:#f87171;--bg:#080616;--bg2:#100d24;--card:#151030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow-x:hidden;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--dl,0s) infinite;}
@keyframes twinkle{0%,100%{opacity:.06}50%{opacity:.9}}
#gate{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#1a0a3a 0%,#080616 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .8s;}
#gate.out{opacity:0;pointer-events:none;}
.gate-logo{font-family:'Fredoka One',cursive;font-size:clamp(52px,10vw,92px);text-align:center;}
.gate-logo .vv{color:var(--pk);text-shadow:0 0 40px #ff6eb466;}
.gate-logo .gz{color:var(--cy);text-shadow:0 0 40px #22d3ee66;}
.gate-sub{color:rgba(255,255,255,.35);font-size:13px;letter-spacing:4px;text-transform:uppercase;}
.gate-heart{font-size:60px;animation:hb 1.4s infinite;}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.gform{display:flex;flex-direction:column;align-items:center;gap:13px;width:100%;max-width:340px;padding:0 24px;}
.gwrap{position:relative;width:100%;}
.gwrap input{width:100%;padding:16px 52px 16px 22px;background:rgba(255,255,255,.06);border:2px solid rgba(255,110,180,.28);border-radius:60px;color:#fff;font-size:16px;font-family:'Nunito',sans-serif;outline:none;transition:all .2s;text-align:center;letter-spacing:4px;-webkit-appearance:none;appearance:none;touch-action:manipulation;}
.gwrap input:focus{border-color:var(--pk);}
.gwrap input.err{border-color:var(--rd);animation:shake .4s;}
.eye-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.45);padding:4px;}
.enter-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--pk),var(--pu));border:none;border-radius:60px;color:#fff;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 8px 30px rgba(255,110,180,.35);transition:transform .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.enter-btn:hover{transform:translateY(-3px);}
.gerr{color:var(--rd);font-size:13px;min-height:20px;text-align:center;font-weight:700;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
#app{display:none;position:relative;z-index:1;}
#app.on{display:block;}
#nav{position:sticky;top:0;z-index:100;background:rgba(8,6,22,.94);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,110,180,.12);padding:0 4%;height:66px;display:flex;align-items:center;justify-content:space-between;}
.nlogo{font-family:'Fredoka One',cursive;font-size:26px;cursor:pointer;}
.nlogo .vv{color:var(--pk)}.nlogo .gz{color:var(--cy)}
.nav-right{display:flex;align-items:center;gap:10px;}
.nscore{background:rgba(255,110,180,.1);border:1px solid rgba(255,110,180,.2);padding:7px 14px;border-radius:50px;font-size:13px;font-weight:800;color:var(--ye);}
.music-btn{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.music-btn:hover{border-color:var(--pk);color:var(--pk);}
.music-btn.muted{border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.25);}
.hero{padding:50px 4% 20px;text-align:center;}
.hero h1{font-family:'Fredoka One',cursive;font-size:clamp(30px,5.5vw,58px);margin-bottom:12px;}
.hero-tagline{font-size:16px;max-width:440px;margin:0 auto 16px;line-height:1.7;font-weight:700;color:rgba(255,255,255,.6);}
.hero-tagline .vv-big{color:#fff;font-size:28px;font-weight:900;display:block;margin-bottom:6px;text-shadow:0 0 24px rgba(255,110,180,.5);}
.hero-tagline .love-line{color:#fff;font-size:20px;font-weight:900;display:block;margin-bottom:4px;}
.stats{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;margin-bottom:16px;}
.stat-n{font-family:'Fredoka One',cursive;font-size:40px;color:var(--pk);}
.stat-l{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;}
.filter-bar{padding:14px 4% 0;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.fcat{padding:7px 17px;border-radius:50px;border:2px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.55);font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;}
.fcat:hover{border-color:rgba(255,110,180,.4);color:#fff;}
.fcat.on{background:linear-gradient(135deg,var(--pk),var(--pu));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(255,110,180,.32);}
.search-wrap{padding:14px 4% 0;display:flex;justify-content:center;}
.search-input{width:100%;max-width:400px;padding:12px 22px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:50px;color:#fff;font-size:14px;font-family:'Nunito',sans-serif;outline:none;transition:all .2s;}
.search-input:focus{border-color:var(--pk);}
.search-input::placeholder{color:rgba(255,255,255,.3);}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;padding:26px 4% 60px;}
@media(max-width:600px){.games-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}}
.gcard{background:var(--card);border-radius:22px;overflow:hidden;cursor:pointer;transition:all .28s;border:2px solid transparent;position:relative;}
.gcard:hover{transform:translateY(-7px) scale(1.026);border-color:var(--pk);box-shadow:0 16px 48px rgba(255,110,180,.28);}
.gcard-thumb{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:68px;}
.gcard-body{padding:14px 15px;}
.gcard-name{font-weight:900;font-size:14px;margin-bottom:2px;}
.gcard-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.4;margin-bottom:9px;}
.gcard-play{display:flex;align-items:center;justify-content:space-between;}
.diff-easy{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:rgba(52,211,153,.14);color:var(--gn);}
.diff-med{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:rgba(251,191,36,.14);color:var(--ye);}
.diff-hard{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:rgba(248,113,113,.14);color:var(--rd);}
.gcard-btn{padding:6px 14px;background:linear-gradient(135deg,var(--pk),var(--pu));border:none;border-radius:20px;color:#fff;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.gnew{position:absolute;top:9px;right:9px;background:var(--ye);color:#000;font-size:9px;font-weight:900;padding:2px 8px;border-radius:20px;}
.ghot{position:absolute;top:9px;right:9px;background:var(--rd);color:#fff;font-size:9px;font-weight:900;padding:2px 8px;border-radius:20px;}
#gmodal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.95);align-items:center;justify-content:center;padding:0;}@media(min-width:600px){#gmodal{padding:10px;}}
#gmodal.on{display:flex;}
.gmodal-box{background:var(--bg2);border-radius:22px;width:100%;max-width:980px;max-height:100vh;height:100vh;display:flex;flex-direction:column;overflow:hidden;border:2px solid rgba(255,110,180,.16);box-shadow:0 28px 70px rgba(0,0,0,.8);animation:mIn .24s ease;}@media(min-width:600px){.gmodal-box{height:97vh;border-radius:22px;}}@media(max-width:599px){.gmodal-box{border-radius:0;}}
@keyframes mIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.gmodal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;min-height:50px;}
.gmodal-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--pk);}
.gmodal-ctrls{display:flex;gap:7px;align-items:center;}
.mctrl{padding:5px 14px;border-radius:50px;border:2px solid rgba(255,255,255,.13);background:transparent;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .18s;}
.mctrl:hover{border-color:var(--pk);color:var(--pk);}
.mclose{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,110,180,.35);background:rgba(255,110,180,.1);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mclose:hover{background:rgba(255,110,180,.3);}
#game-frame{flex:1;overflow:hidden;background:#000;min-height:0;}
#game-frame iframe{width:100%;height:100%;min-height:0;border:none;display:block;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--pk),var(--pu));border-radius:50px;padding:10px 24px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;}
.site-footer{text-align:center;padding:28px;color:rgba(255,255,255,.16);font-size:12px;border-top:1px solid rgba(255,255,255,.05);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:rgba(255,110,180,.3);border-radius:3px;}

/* Mobile responsive modal & games */
@media(max-width:599px){
  #nav{height:54px;padding:0 3%;}
  .nlogo{font-size:20px;}
  .nscore{font-size:11px;padding:5px 10px;}
  .gmodal-head{padding:10px 12px;}
  .gmodal-title{font-size:16px;}
  .mctrl{padding:4px 10px;font-size:11px;}
  .mclose{width:30px;height:30px;font-size:14px;}
  .hero{padding:28px 4% 12px;}
  .hero h1{font-size:24px;}
  .hero-tagline .vv-big{font-size:22px;}
  .hero-tagline .love-line{font-size:16px;}
  .stat-n{font-size:28px;}
  .games-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:16px 3% 40px;}
  .gcard-thumb{font-size:52px;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="gate">
  <div class="gate-heart">💝</div>
  <div class="gate-logo"><span class="vv">VV </span><span class="gz">GameZone</span></div>

  <div class="gform">
    <div class="gwrap">
      <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="numeric">
      <button class="eye-btn" id="eye-btn"><svg id="eye-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="gerr" id="pw-err"></div>
    <button class="enter-btn" id="enter-btn">🎮 Enter GameZone</button>
  </div>
</div>
<div id="app">
  <nav id="nav">
    <div class="nlogo" id="nav-logo"><span class="vv">VV </span><span class="gz">GameZone</span></div>
    <div class="nav-right">
      <div class="nscore">🔥 <span id="coins-el">0</span> pts &nbsp;🏆 <span id="played-el">0</span></div>
      <button class="music-btn" id="music-btn">🎵</button>
    </div>
  </nav>
  <div class="hero">
    <h1>🎮 Games</h1>
    <div class="hero-tagline">
      <span class="vv-big">VV</span>
      <span class="love-line">Made just for you 💝</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="stat-pl">0</div><div class="stat-l">Played</div></div>
      <div class="stat"><div class="stat-n" id="stat-pt">0</div><div class="stat-l">Points</div></div>
    </div>
  </div>
  <div class="search-wrap"><input class="search-input" id="search-input" placeholder="🔍 Search games..." oninput="searchGames(this.value)"></div>
  <div class="filter-bar" id="fbar">
    <button class="fcat on" data-cat="all">All Games</button>
    <button class="fcat" data-cat="arcade">Arcade</button>
    <button class="fcat" data-cat="puzzle">Puzzle</button>
    <button class="fcat" data-cat="card">Card</button>
    <button class="fcat" data-cat="word">Word</button>
    <button class="fcat" data-cat="memory">Memory</button>
    <button class="fcat" data-cat="casual">Casual</button>
    <button class="fcat" data-cat="strategy">Strategy</button>
    <button class="fcat" data-cat="action">Action</button>
    <button class="fcat" data-cat="racing">Racing</button>
  </div>
  <div class="games-grid" id="grid"></div>
  <footer class="site-footer">💝 VV GameZone — Made with love · No ads</footer>
</div>
<div id="gmodal">
  <div class="gmodal-box">
    <div class="gmodal-head">
      <div class="gmodal-title" id="modal-title">Game</div>
      <div class="gmodal-ctrls">
        <button class="mctrl" id="restart-btn">🔄 Restart</button>
        <button class="mctrl" id="fs-btn">⛶ Full</button>
        <button class="mclose" id="close-btn">✕</button>
      </div>
    </div>
    <div id="game-frame"></div>
  </div>
</div>
<div id="toast"></div>
<script>
(function(){"use strict";
var PW="06082003";
var coins=parseInt(localStorage.getItem("vv_coins")||"0");
var played=parseInt(localStorage.getItem("vv_played")||"0");
var curGame=null,musicOn=true,audioCtx=null;
(function(){var c=document.getElementById("stars");for(var i=0;i<110;i++){var s=document.createElement("div");s.className="star";var sz=Math.random()<.2?2.5:1.2;s.style.cssText="left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;width:"+sz+"px;height:"+sz+"px;--d:"+(2+Math.random()*5)+"s;--dl:"+Math.random()*6+"s";c.appendChild(s);}})();
var musicBtn=document.getElementById("music-btn");
musicBtn.addEventListener("click",function(){musicOn=!musicOn;musicBtn.textContent=musicOn?"🎵":"🔇";musicBtn.className="music-btn"+(musicOn?"":" muted");});
function playClick(){if(!musicOn)return;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(800,audioCtx.currentTime);g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);o.start();o.stop(audioCtx.currentTime+0.12);}catch(e){}}
var eyeBtn=document.getElementById("eye-btn"),pwInp=document.getElementById("pw-input"),eyeOpen=false;
eyeBtn.addEventListener("click",function(){
  eyeOpen=!eyeOpen;
  pwInp.type=eyeOpen?"text":"password";
  var svg=document.getElementById("eye-svg");
  if(eyeOpen){
    svg.innerHTML="<path d='M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24'/><line x1='1' y1='1' x2='23' y2='23'/>";
  } else {
    svg.innerHTML="<path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/>";
  }
});
function checkPw(){if(pwInp.value===PW){document.getElementById("pw-err").textContent="";var gate=document.getElementById("gate");gate.classList.add("out");setTimeout(function(){gate.style.display="none";document.getElementById("app").classList.add("on");renderGrid("all");updateScore();},700);}else{document.getElementById("pw-err").textContent="❌ Wrong password!";pwInp.classList.add("err");setTimeout(function(){pwInp.classList.remove("err");pwInp.value="";},600);}}
document.getElementById("enter-btn").addEventListener("click",checkPw);
pwInp.addEventListener("keydown",function(e){if(e.key==="Enter")checkPw();});
function updateScore(){document.getElementById("coins-el").textContent=coins;document.getElementById("played-el").textContent=played;document.getElementById("stat-pl").textContent=played;document.getElementById("stat-pt").textContent=coins;}
function addPts(n){coins+=n;played++;localStorage.setItem("vv_coins",coins);localStorage.setItem("vv_played",played);updateScore();showToast("+"+n+" points! 🎉");}
var tt;function showToast(m){var el=document.getElementById("toast");el.textContent=m;el.classList.add("on");clearTimeout(tt);tt=setTimeout(function(){el.classList.remove("on");},2500);}
var GAMES=[

'var C=document.getElementById("c"),ctx=C.getContext("2d"),W=460,H=380;var targets=[],score=0,arrows=10,level=1,projectiles=[],af,over=false,dragging=false,mx=0,my=0,pressed=false;var AX=55,AY=H-70;function init(){targets=[];score=0;arrows=10;level=1;over=false;projectiles=[];document.getElementById("sc").textContent=" 0";document.getElementById("ar").textContent=" 10";document.getElementById("lv").textContent=" 1";document.getElementById("msg").textContent="Drag from archer outward to aim and shoot!";spawnTargets();cancelAnimationFrame(af);loop();}function spawnTargets(){targets=[];var n=3+level;for(var i=0;i<n;i++){var t={x:180+Math.random()*(W-220),y:30+Math.random()*(H/2-40),r:Math.max(14,24-level*2),pts:0,vx:0};t.pts=Math.round(200/t.r)*5;t.vx=(Math.random()-.5)*(0.5+level*0.4);targets.push(t);}}function loop(){if(over)return;af=requestAnimationFrame(loop);targets.forEach(function(t){t.x+=t.vx;if(t.x-t.r<160)t.vx=Math.abs(t.vx);if(t.x+t.r>W-10)t.vx=-Math.abs(t.vx);});projectiles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life--;});for(var pi=projectiles.length-1;pi>=0;pi--){for(var ti=targets.length-1;ti>=0;ti--){if(Math.hypot(projectiles[pi].x-targets[ti].x,projectiles[pi].y-targets[ti].y)<targets[ti].r+4){score+=targets[ti].pts;document.getElementById("sc").textContent=" "+score;targets.splice(ti,1);projectiles.splice(pi,1);if(pi>=projectiles.length)break;break;}}}projectiles=projectiles.filter(function(p){return p.life>0&&p.x<W+50&&p.y<H+50;});if(targets.length===0&&!over){level++;document.getElementById("lv").textContent=" "+level;spawnTargets();document.getElementById("msg").textContent="Level "+level+"! "+(level>2?"Targets faster!":"Keep going!");}draw();}function shoot(){if(over||arrows<=0)return;var dx=AX-mx,dy=AY-my;var dist=Math.hypot(dx,dy);if(dist<10)return;var spd=Math.min(dist*0.14,16);projectiles.push({x:AX+18,y:AY-8,vx:(dx/dist)*spd*-1,vy:(dy/dist)*spd*-1,life:90});arrows--;document.getElementById("ar").textContent=" "+arrows;if(arrows<=0){document.getElementById("msg").textContent=targets.length?"😢 Out of arrows! Score: "+score:"🎉 Final Score: "+score;over=true;cancelAnimationFrame(af);draw();}}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle="#0d1a0d";ctx.fillRect(0,0,W,H);ctx.fillStyle="rgba(163,230,53,.08)";ctx.fillRect(0,H-40,W,40);ctx.fillStyle="rgba(163,230,53,.04)";ctx.fillRect(0,H-80,W,40);targets.forEach(function(t){var rings=[t.r,t.r*0.68,t.r*0.36];var cols=["#fff","#f87171","#fbbf24"];for(var i=0;i<3;i++){ctx.beginPath();ctx.arc(t.x,t.y,rings[i],0,Math.PI*2);ctx.fillStyle=cols[i];ctx.fill();}ctx.fillStyle="#111";ctx.font="bold "+(t.r<18?"9":"11")+"px sans-serif";ctx.textAlign="center";ctx.fillText(t.pts+"",t.x,t.y+4);});projectiles.forEach(function(p){ctx.save();ctx.translate(p.x,p.y);var ang=Math.atan2(p.vy,p.vx);ctx.rotate(ang);ctx.fillStyle="#a3e635";ctx.fillRect(-12,-2,20,4);ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.moveTo(8,-5);ctx.lineTo(16,0);ctx.lineTo(8,5);ctx.fill();ctx.fillStyle="#f87171";ctx.fillRect(-14,-2,4,4);ctx.restore();});ctx.font="32px sans-serif";ctx.textAlign="center";ctx.fillText("🏹",AX,AY);if(dragging&&!over){var dx=AX-mx,dy=AY-my,dist=Math.hypot(dx,dy);if(dist>10){ctx.strokeStyle="rgba(163,230,53,.6)";ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(AX+18,AY-8);var fx=AX+18+(dx/dist)*-dist*0.7,fy=AY-8+(dy/dist)*-dist*0.7;ctx.lineTo(fx,fy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="rgba(163,230,53,.4)";ctx.beginPath();ctx.arc(AX+18+(dx/dist)*-Math.min(dist,80),AY-8+(dy/dist)*-Math.min(dist,80),4,0,Math.PI*2);ctx.fill();}}if(over){ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(W/2-140,H/2-40,280,80);ctx.fillStyle="#a3e635";ctx.font="bold 20px sans-serif";ctx.textAlign="center";ctx.fillText(arrows<=0&&targets.length?"Out of Arrows!":"All targets hit!",W/2,H/2-8);ctx.fillStyle="#fbbf24";ctx.font="bold 16px sans-serif";ctx.fillText("Score: "+score,W/2,H/2+20);}}function getXY(e){var r=C.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};}C.addEventListener("mousedown",function(e){if(over)return;var p=getXY(e);dragging=true;mx=p.x;my=p.y;});C.addEventListener("mousemove",function(e){if(!dragging)return;var p=getXY(e);mx=p.x;my=p.y;});C.addEventListener("mouseup",function(e){if(!dragging)return;dragging=false;shoot();});C.addEventListener("touchstart",function(e){e.preventDefault();if(over)return;var p=getXY(e);dragging=true;mx=p.x;my=p.y;},{passive:false});C.addEventListener("touchmove",function(e){e.preventDefault();if(!dragging)return;var p=getXY(e);mx=p.x;my=p.y;},{passive:false});C.addEventListener("touchend",function(e){e.preventDefault();if(!dragging)return;dragging=false;shoot();},{passive:false});init();');};
// ===== CLOSE SCRIPT =====
renderGrid("all");
updateScore();
})();
</script>
